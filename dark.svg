<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
  <defs>  
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">    
      <stop offset="0%" stop-color="#A855F7">      
        <animate attributeName="stop-color" values="#A855F7;#EC4899;#3B82F6;#A855F7" dur="8s" repeatCount="indefinite"/>    
      </stop>    
      <stop offset="100%" stop-color="#3B82F6">      
        <animate attributeName="stop-color" values="#3B82F6;#A855F7;#EC4899;#3B82F6" dur="8s" repeatCount="indefinite"/>    
      </stop>  
    </linearGradient>  
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">    
      <stop offset="0%" stop-color="#C084FC"/>    
      <stop offset="50%" stop-color="#38BDF8"/>    
      <stop offset="100%" stop-color="#F472B6"/>  
    </linearGradient>  
    <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">    
      <stop offset="0%" stop-color="#0F0C1B"/>    
      <stop offset="100%" stop-color="#05030A"/>  
    </radialGradient>  
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">  
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0"/>  
      <stop offset="45%" stop-color="#C084FC" stop-opacity="0.05"/>  
      <stop offset="50%" stop-color="#F472B6" stop-opacity="0.5"/>  
      <stop offset="55%" stop-color="#C084FC" stop-opacity="0.05"/>  
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>  
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">  
      <rect width="4" height="1" fill="#C084FC" opacity="0.04"/>
    </pattern>  

    <style>    
      .ascii  { font-family: 'Courier New', Consolas, monospace; font-size: 8.8px; fill: url(#asciiGrad); letter-spacing: -0.5px; }    
      .key    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #38BDF8; font-weight: bold; }    
      .value  { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #F3F4F6; }    
      .cc     { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #4B5563; }    
      .head   { font-family: 'Courier New', Consolas, monospace; font-size: 16px; fill: #C084FC; font-weight: bold; }    
      .accent { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #F472B6; font-weight: bold; }    
      text, tspan { white-space: pre; }        
      .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #9CA3AF; letter-spacing: 0.5px; }    
      .scan-label { font-family: 'Courier New', Consolas, monospace; font-size: 10px; fill: #F472B6; letter-spacing: 1px; }    
      .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #C084FC; letter-spacing: 2px; opacity: 0.85; }    

      /* Transição de Boot do Terminal Fluida */
      .fade-line {
        opacity: 0;
        animation: fadeInLine 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      }

      .laser-bar {
        animation: laserScan 2.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes fadeInLine {
        from { opacity: 0; transform: translateY(2px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes laserScan {
        0% { transform: translateY(0px); opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateY(610px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1180" height="610" rx="18" fill="url(#bgGlow)"/>
  <rect width="1180" height="610" rx="18" fill="url(#scanlines)"/>

  <g id="titlebar">  
    <rect x="3" y="3" width="1174" height="34" rx="16" fill="#0F0C1B" fill-opacity="0.9"/>  
    <circle cx="24" cy="20" r="5" fill="#EF4444"/>  
    <circle cx="42" cy="20" r="5" fill="#F59E0B"/>  
    <circle cx="60" cy="20" r="5" fill="#10B981"/>  
    <text x="590" y="25" text-anchor="middle" class="term-label">emily@-dev ~ % ./profile.sh --live</text>  
    <circle cx="1122" cy="20" r="4" fill="#F472B6">    
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>  
    </circle>  
    <text x="1132" y="24" class="scan-label">ONLINE</text>
  </g>

